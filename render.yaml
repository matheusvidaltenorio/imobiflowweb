# ImobiFlow - Deploy no Render
# Front, back e banco no Render. Conecte o repositório e configure as variáveis no Dashboard.

databases:
  - name: imobflow-db
    databaseName: imobflow
    plan: free

services:
  # Backend NestJS
  - type: web
    runtime: node
    name: imobflow-api
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: imobflow-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "ImobiFlow <onboarding@resend.dev>"

  # Frontend Next.js
  - type: web
    runtime: node
    name: imobflow-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        value: "https://imobflow-api.onrender.com/api"
      - key: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
        sync: false
